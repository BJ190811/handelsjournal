<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handelsjournal</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#10151C">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-950:#10151C;
    --ink-900:rgba(24,28,32,0.16);
    --ink-850:rgba(28,32,37,0.14);
    --ink-800:rgba(32,37,43,0.14);
    --ink-700:rgba(140,142,144,0.22);
    --parchment:#EDE7D9;
    --parchment-dim:#A9A290;
    --muted:#7D8894;
    --gold:#C9A227;
    --gold-soft:#4A3F1E;
    --gain:#6FB585;
    --loss:#D07A63;
  }
  body.light-mode{
    --ink-950:#EFEAE0;
    --ink-900:rgba(255,255,255,0.55);
    --ink-850:rgba(255,255,255,0.60);
    --ink-800:rgba(255,255,255,0.65);
    --ink-700:rgba(70,60,45,0.20);
    --parchment:#242119;
    --parchment-dim:#6E665A;
    --muted:#847B6D;
    --gold:#9C7A1B;
    --gold-soft:#F1E4BC;
    --gain:#3F8F5C;
    --loss:#B14A36;
    background:#EFEAE0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--ink-950) url('bg-texture.jpg') center top / cover no-repeat;
    background-attachment:fixed;
    color:var(--parchment);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .wrap{max-width:760px;margin:0 auto;padding:2.5rem 1.5rem 5rem;}

  .ledger-head{
    display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:1px solid var(--gold-soft);
    padding-bottom:1.1rem;margin-bottom:0.4rem;
  }
  .ledger-head .under{
    border-bottom:1px solid var(--ink-700);
    margin-bottom:2rem;
  }
  h1{
    font-family:'Inter',sans-serif;
    font-weight:800;
    font-size:1.3rem;
    margin:0;
    letter-spacing:-0.01em;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:0.6rem;
  }
  .brand-logo{
    height:38px;
    width:38px;
    display:block;
    border-radius:50%;
  }
  .stj-sub{
    color:var(--parchment-dim);
    font-weight:600;
    font-size:0.92rem;
    letter-spacing:0;
  }
  .add-trade-wrap{
    display:flex;
    justify-content:center;
    gap:0.7rem;
    margin:0.5rem 0 3rem;
    flex-wrap:wrap;
  }
  .menu-wrap{position:relative;flex-shrink:0;}
  .menu-btn{
    background:transparent;
    border:1px solid var(--ink-700);
    color:var(--parchment-dim);
    width:34px;height:34px;
    border-radius:4px;
    font-size:1.05rem;
    line-height:1;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .menu-btn:hover{border-color:var(--gold);color:var(--gold);}
  .menu-dropdown{
    display:none;
    position:absolute;
    top:calc(100% + 0.4rem);
    right:0;
    min-width:160px;
    background:var(--ink-950);
    border:1px solid var(--ink-700);
    border-radius:4px;
    overflow:hidden;
    z-index:50;
    box-shadow:0 8px 24px rgba(0,0,0,0.4);
  }
  .menu-dropdown.open{display:block;}
  .menu-dropdown button{
    display:block;
    width:100%;
    text-align:left;
    background:none;
    border:none;
    color:var(--parchment);
    font-family:'Inter',sans-serif;
    font-size:0.85rem;
    padding:0.7rem 1rem;
    cursor:pointer;
  }
  .menu-dropdown button:hover{background:var(--ink-800);color:var(--gold);}
  .menu-dropdown button + button{border-top:1px solid var(--ink-700);}

  .page-overlay{
    display:none;
    position:fixed;inset:0;
    background:var(--ink-950) url('bg-texture.jpg') center top / cover no-repeat;
    background-attachment:fixed;
    z-index:80;
    overflow-y:auto;
  }
  body.light-mode .page-overlay{background:#EFEAE0;}
  .page-overlay.open{display:block;}
  #statsPageContent{transition:transform 0.22s ease, opacity 0.22s ease;}
  .page-inner{max-width:760px;margin:0 auto;padding:1.6rem 1.5rem 4rem;}
  .page-head{
    display:flex;justify-content:space-between;align-items:center;
    border-bottom:1px solid var(--gold-soft);
    padding-bottom:1.1rem;margin-bottom:1.6rem;
  }
  .page-head h2{
    font-family:'Inter',sans-serif;font-weight:800;font-size:1.2rem;
    margin:0;color:var(--parchment);letter-spacing:-0.01em;
  }
  .page-close{
    background:transparent;border:1px solid var(--ink-700);color:var(--parchment-dim);
    width:32px;height:32px;border-radius:4px;font-size:0.95rem;cursor:pointer;
  }
  .page-close:hover{border-color:var(--gold);color:var(--gold);}
  .stat-block{
    background:var(--ink-900);
    border:1px solid var(--ink-700);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    padding:1rem 1.2rem;
    margin-bottom:1.2rem;
  }
  .stat-block .kicker{margin-bottom:0.3rem;}
  .stat-block-row{
    display:flex;justify-content:space-between;align-items:baseline;
    padding:0.5rem 0;border-bottom:1px solid var(--ink-700);
    font-size:0.85rem;
  }
  .stat-block-row:last-child{border-bottom:none;}
  .stat-block-row .val{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-weight:600;}
  .settings-row{
    background:var(--ink-900);
    border:1px solid var(--ink-700);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    padding:1rem 1.2rem;
    margin-bottom:1rem;
  }
  .settings-row .kicker{margin-bottom:0.5rem;}
  .settings-row input{
    width:100%;
    background:var(--ink-850);
    border:1px solid var(--ink-700);
    color:var(--parchment);
    padding:0.5rem 0.6rem;
    font-family:'Inter',sans-serif;
    font-size:0.86rem;
    border-radius:2px;
    margin-bottom:0.7rem;
  }
  .settings-row select{
    width:100%;
    background:var(--ink-850);
    border:1px solid var(--ink-700);
    color:var(--parchment);
    padding:0.5rem 0.6rem;
    font-family:'Inter',sans-serif;
    font-size:0.86rem;
    border-radius:2px;
  }
  .btn-danger{border-color:var(--loss);color:var(--loss);}
  .btn-danger:hover{background:rgba(208,122,99,0.15);}
  .theme-toggle{display:flex;gap:0.4rem;}
  .theme-toggle button{
    flex:1;
    padding:0.5rem;
    background:var(--ink-850);
    border:1px solid var(--ink-700);
    color:var(--parchment-dim);
    cursor:pointer;
    font-size:0.82rem;
    border-radius:2px;
  }
  .theme-toggle button.active{border-color:var(--gold);color:var(--gold);}
  #editList{max-height:60vh;overflow-y:auto;}
  .edit-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:0.65rem 0;
    border-bottom:1px solid var(--ink-700);
  }
  .edit-row:last-child{border-bottom:none;}
  .edit-row-info{
    display:flex;flex-direction:column;gap:0.2rem;
    font-size:0.82rem;
  }
  .mono{font-variant-numeric:tabular-nums;}
  .edit-row-info .mono{font-weight:600;font-size:0.88rem;}
  .edit-row-actions{display:flex;gap:0.4rem;}
  .icon-btn{
    background:none;
    border:1px solid var(--ink-700);
    color:var(--parchment-dim);
    width:28px;height:28px;
    border-radius:2px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:0.85rem;
    padding:0;
  }
  .icon-btn:hover{border-color:var(--gold);color:var(--gold);}
  .icon-btn.danger:hover{border-color:var(--loss);color:var(--loss);}
  .kicker{
    font-size:0.72rem;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--muted);
    margin:0 0 0.35rem;
  }

  .hero{margin:1.2rem 0 1.6rem;}
  .hero .kicker{margin-bottom:0.25rem;}
  .hero-num-row{display:flex;align-items:baseline;gap:0.6rem;flex-wrap:wrap;}
  .hero-num{
    font-family:'Inter',sans-serif;
    font-variant-numeric:tabular-nums;
    font-size:1.9rem;
    font-weight:700;
    line-height:1;
  }
  .hero-pct{
    font-family:'Inter',sans-serif;
    font-variant-numeric:tabular-nums;
    font-size:0.95rem;
    font-weight:600;
  }
  .gain{color:var(--gain);}
  .loss{color:var(--loss);}
  .neutral{color:var(--parchment-dim);}

  .balance-edit-input{
    background:var(--ink-850);
    border:1px solid var(--gold);
    color:var(--parchment);
    font-family:'Inter',sans-serif;
    font-variant-numeric:tabular-nums;
    font-size:0.98rem;
    font-weight:500;
    width:100%;
    padding:0.05rem 0.2rem;
    border-radius:2px;
  }

  .balance-row{
    margin-bottom:1.6rem;
    padding-bottom:1.4rem;
    border-bottom:1px solid var(--ink-700);
  }
  .balance-row .kicker{margin-bottom:0.25rem;}
  .balance-num{
    font-family:'Inter',sans-serif;
    font-variant-numeric:tabular-nums;
    font-size:1.3rem;
    font-weight:500;
    color:var(--parchment);
    cursor:pointer;
    border-bottom:1px dashed var(--muted);
    display:inline-block;
  }

  .stats{
    display:flex;
    flex-wrap:wrap;
    background:var(--ink-900);
    border:1px solid var(--ink-700);
    margin-bottom:1.6rem;
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
  }
  .stat{
    background:transparent;
    padding:0.55rem 0.7rem;
    flex:1 1 105px;
  }
  .stat .kicker{margin-bottom:0.2rem;font-size:0.62rem;}
  .stat-val{
    font-family:'Inter',sans-serif;
    font-variant-numeric:tabular-nums;
    font-size:0.98rem;
    font-weight:600;
  }

  .equity-card{
    background:var(--ink-900);
    border:1px solid var(--ink-700);
    padding:1.1rem 1.2rem 0.6rem;
    margin-bottom:2.4rem;
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
  }
  .equity-head{
    display:flex;justify-content:space-between;align-items:center;
    flex-wrap:wrap;gap:0.5rem;
    margin-bottom:0.6rem;
  }
  .equity-head .kicker{margin-bottom:0;}
  .period-nav{
    display:flex;align-items:center;gap:0.5rem;
  }
  .period-arrow{
    background:none;
    border:1px solid var(--ink-700);
    color:var(--parchment-dim);
    width:24px;height:24px;
    border-radius:2px;
    cursor:pointer;
    font-size:0.85rem;
    line-height:1;
    display:flex;align-items:center;justify-content:center;
    padding:0;
  }
  .period-arrow:hover{border-color:var(--gold);color:var(--gold);}
  .period-arrow:active{background:var(--gold-soft);}
  .period-active{
    font-family:'Inter',sans-serif;
    font-size:0.78rem;
    font-weight:500;
    color:var(--gold);
    min-width:64px;
    text-align:center;
  }
  .equity-viewport{overflow:hidden;}
  #equityChart{
    transition:transform 0.22s ease, opacity 0.22s ease;
  }
  .period-label{
    font-family:'Inter',sans-serif;
    font-variant-numeric:tabular-nums;
    font-weight:500;
    font-size:0.78rem;
    color:var(--gold);
    margin:0 0 0.6rem;
  }
  .equity-card{touch-action:pan-y;}
  .equity-empty{
    color:var(--parchment-dim);
    font-size:0.82rem;
    padding:1.5rem 0;
    text-align:center;
  }

  .btn{
    font-family:'Inter',sans-serif;
    font-size:0.82rem;
    font-weight:500;
    padding:0.55rem 1rem;
    border:1px solid var(--gold);
    background:transparent;
    color:var(--gold);
    cursor:pointer;
    border-radius:2px;
    white-space:nowrap;
  }
  .btn:hover{background:var(--gold-soft);}

  .modal-overlay{
    display:none;
    position:fixed;inset:0;
    background:rgba(8,11,15,0.72);
    align-items:center;justify-content:center;
    padding:1.2rem;
    z-index:100;
  }
  body.light-mode .modal-overlay{background:rgba(200,192,175,0.78);}
  .modal-overlay.open{display:flex;}
  .panel{
    background:var(--ink-900);
    border:1px solid var(--ink-700);
    padding:1.4rem;
    width:100%;
    max-width:460px;
    max-height:90vh;
    overflow-y:auto;
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
  }
  .panel-head{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:1.1rem;
  }
  .panel-head h2{
    font-family:'Inter',sans-serif;
    font-weight:700;
    font-size:1.1rem;
    margin:0;
  }
  .modal-close{
    background:none;border:none;color:var(--muted);
    font-size:1.1rem;cursor:pointer;padding:0.2rem 0.4rem;
  }
  .modal-close:hover{color:var(--parchment);}
  .grid-form{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:0.9rem;
  }
  .field label{
    display:block;
    font-size:0.72rem;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:0.35rem;
  }
  .field input{
    width:100%;
    background:var(--ink-850);
    border:1px solid var(--ink-700);
    color:var(--parchment);
    padding:0.5rem 0.6rem;
    font-family:'Inter',sans-serif;
    font-size:0.86rem;
    border-radius:2px;
  }
  .dir-toggle{display:flex;gap:0.4rem;}
  .dir-toggle button{
    flex:1;
    padding:0.5rem;
    background:var(--ink-850);
    border:1px solid var(--ink-700);
    color:var(--parchment-dim);
    cursor:pointer;
    font-size:0.82rem;
    border-radius:2px;
  }
  .dir-toggle button.sel-long{border-color:var(--gain);color:var(--gain);}
  .dir-toggle button.sel-short{border-color:var(--loss);color:var(--loss);}
  .panel-actions{
    margin-top:1.2rem;display:flex;gap:0.6rem;justify-content:flex-end;
  }
  .btn-ghost{
    border-color:var(--ink-700);color:var(--parchment-dim);
  }
  .btn-ghost:hover{background:var(--ink-800);}

</style>
</head>
<body>
<div class="wrap">

  <div class="ledger-head">
    <div class="brand">
      <img src="icon-512.png" alt="STJ Logo" class="brand-logo">
      <span class="stj-sub">Simple Trading Journal</span>
    </div>
    <div class="menu-wrap">
      <button type="button" class="menu-btn" id="menuBtn" aria-label="Menü">☰</button>
      <div class="menu-dropdown" id="menuDropdown">
        <button type="button" id="menuStatsBtn">Statistik</button>
        <button type="button" id="menuSettingsBtn">Einstellungen</button>
      </div>
    </div>
  </div>
  <div class="under"></div>

  <div class="hero">
    <p class="kicker" id="heroLabel">Gesamtergebnis</p>
    <div class="hero-num-row">
      <div class="hero-num neutral" id="heroPnl">0,00</div>
      <div class="hero-pct neutral" id="heroPct">0,0 %</div>
    </div>
  </div>

  <div class="balance-row">
    <p class="kicker">Kontostand</p>
    <div class="balance-num" id="balanceNum" onclick="startEditBalance()">0,00</div>
  </div>

  <div class="stats" id="statsGrid"></div>

  <div class="equity-card" id="equityCard">
    <div class="equity-head">
      <p class="kicker">Equity Curve</p>
      <div class="period-nav">
        <button type="button" class="period-arrow" id="periodPrev" aria-label="Vorheriger Zeitraum">‹</button>
        <span class="period-active" id="periodActive"></span>
        <button type="button" class="period-arrow" id="periodNext" aria-label="Nächster Zeitraum">›</button>
      </div>
    </div>
    <p class="period-label" id="periodLabel"></p>
    <div class="equity-viewport">
      <div id="equityChart"></div>
    </div>
  </div>

  <div class="add-trade-wrap">
    <button class="btn" id="toggleFormBtn">+ Neuer Trade</button>
    <button class="btn btn-ghost" id="editTradesBtn">Edit Trades</button>
  </div>

  <div class="modal-overlay" id="editModal">
    <div class="panel">
      <div class="panel-head">
        <h2>Trades bearbeiten</h2>
        <button type="button" class="modal-close" id="editModalCloseBtn" aria-label="Schließen">✕</button>
      </div>
      <div id="editList"></div>
    </div>
  </div>

  <div class="page-overlay" id="statsPage">
    <div class="page-inner">
      <div class="page-head">
        <h2>Statistik</h2>
        <button type="button" class="page-close" id="statsPageCloseBtn" aria-label="Schließen">✕</button>
      </div>
      <div id="statsPageContent"></div>
    </div>
  </div>

  <div class="page-overlay" id="settingsPage">
    <div class="page-inner">
      <div class="page-head">
        <h2>Einstellungen</h2>
        <button type="button" class="page-close" id="settingsPageCloseBtn" aria-label="Schließen">✕</button>
      </div>
      <div class="settings-row">
        <p class="kicker">Darstellung</p>
        <div class="theme-toggle">
          <button type="button" id="themeDarkBtn">Dark</button>
          <button type="button" id="themeDayBtn">Day</button>
        </div>
      </div>
      <div class="settings-row">
        <p class="kicker">Währung</p>
        <select id="settingsCurrency">
          <option value="EUR">Euro (€)</option>
          <option value="USD">US-Dollar ($)</option>
          <option value="GBP">Britisches Pfund (£)</option>
          <option value="CHF">Schweizer Franken (CHF)</option>
          <option value="JPY">Japanischer Yen (¥)</option>
        </select>
      </div>
      <div class="settings-row">
        <p class="kicker">Startkapital</p>
        <input type="number" step="any" id="settingsStartBalance" placeholder="0,00">
        <button type="button" class="btn" id="settingsSaveBalanceBtn">Speichern</button>
      </div>
      <div class="settings-row">
        <p class="kicker">Alle Daten löschen</p>
        <p style="font-size:0.8rem;color:var(--parchment-dim);margin:0 0 0.8rem;">Entfernt unwiderruflich alle Trades und das Startkapital von diesem Gerät.</p>
        <button type="button" class="btn btn-danger" id="settingsResetBtn">Alle Daten löschen</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="tradeModal">
    <div class="panel" id="tradePanel">
      <div class="panel-head">
        <h2 id="tradeModalTitle">Neuer Eintrag</h2>
        <button type="button" class="modal-close" onclick="closePanel()" aria-label="Schließen">✕</button>
      </div>
      <div class="grid-form">
        <div class="field">
          <label>Datum</label>
          <input type="date" id="f-date">
        </div>
        <div class="field">
          <label>Richtung</label>
          <div class="dir-toggle">
            <button type="button" id="f-long" onclick="setDirection('long')">Long</button>
            <button type="button" id="f-short" onclick="setDirection('short')">Short</button>
          </div>
        </div>
        <div class="field">
          <label>Asset</label>
          <input type="text" id="f-asset" placeholder="z. B. AAPL, BTC, EUR/USD">
        </div>
        <div class="field">
          <label>P&L</label>
          <input type="number" step="any" id="f-pnl" placeholder="z. B. 150 oder -80">
        </div>
      </div>
      <div class="panel-actions">
        <button class="btn btn-ghost" onclick="closePanel()">Abbrechen</button>
        <button class="btn" id="saveTradeBtn" onclick="saveTrade()">Trade speichern</button>
      </div>
    </div>
  </div>

</div>

<script>
let trades = [];
let startBalance = 0;
let theme = 'dark';
let currentCurrency = 'EUR';
let currentPeriod = 'monthly';
let currentDirection = 'long';
let editingId = null;

function loadTheme(){
  try{
    theme = localStorage.getItem('theme') || 'dark';
  }catch(e){
    theme = 'dark';
  }
  applyTheme();
}

function applyTheme(){
  document.body.classList.toggle('light-mode', theme === 'light');
  const darkBtn = document.getElementById('themeDarkBtn');
  const dayBtn = document.getElementById('themeDayBtn');
  if(darkBtn && dayBtn){
    darkBtn.classList.toggle('active', theme === 'dark');
    dayBtn.classList.toggle('active', theme === 'light');
  }
}

function setTheme(t){
  theme = t;
  try{ localStorage.setItem('theme', theme); }catch(e){}
  applyTheme();
}

document.getElementById('themeDarkBtn').addEventListener('click', () => setTheme('dark'));
document.getElementById('themeDayBtn').addEventListener('click', () => setTheme('light'));

function loadCurrency(){
  try{
    const raw = localStorage.getItem('currency');
    currentCurrency = raw || 'EUR';
  }catch(e){
    currentCurrency = 'EUR';
  }
  const sel = document.getElementById('settingsCurrency');
  if(sel) sel.value = currentCurrency;
}

function fmt(n){
  try{
    return new Intl.NumberFormat('de-DE',{style:'currency',currency:currentCurrency,signDisplay:'exceptZero'}).format(n);
  }catch(e){
    const sign = n > 0 ? '+' : '';
    return sign + n.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2});
  }
}

function fmtPlain(n){
  try{
    return new Intl.NumberFormat('de-DE',{style:'currency',currency:currentCurrency}).format(n);
  }catch(e){
    return n.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2});

async function saveTrade(){
  const pnl = parseFloat(document.getElementById('f-pnl').value);
  const date = document.getElementById('f-date').value;
  const asset = document.getElementById('f-asset').value.trim();
  if(!date || isNaN(pnl) || !asset){
    alert('Bitte Datum, Asset und P&L ausfüllen.');
    return;
  }
  if(editingId){
    const existing = trades.find(t => t.id === editingId);
    if(existing){
      existing.date = date;
      existing.direction = currentDirection;
      existing.asset = asset;
      existing.pnl = pnl;
    }
  } else {
    trades.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,7),
      date,
      direction: currentDirection,
      asset,
      pnl
    });
  }
  await persist();
  closePanel();
  render();
}

function shiftStatsMonth(dir){
  const [y,m] = statsMonth.split('-').map(Number);
  const d = new Date(y, (m-1)+dir, 1);
  statsMonth = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  renderStatsPage();
}

function renderStatsPage(){
  const container = document.getElementById('statsPageContent');
  const monthTrades = trades.filter(t => t.date.slice(0,7) === statsMonth);
  const [y,m] = statsMonth.split('-').map(Number);
  const monthLabel = new Date(y, m-1, 1).toLocaleDateString('de-DE', {month:'long', year:'numeric'});

  const fmtRow = (label, val) => `<div class="stat-block-row"><span>${label}</span><span class="val">${val}</span></div>`;

  if(monthTrades.length === 0){
    container.innerHTML = `
      <div class="month-nav">
        <button type="button" class="period-arrow" id="statsMonthPrev" aria-label="Vorheriger Monat">‹</button>
        <span class="month-nav-label">${monthLabel}</span>
        <button type="button" class="period-arrow" id="statsMonthNext" aria-label="Nächster Monat">›</button>
      </div>
      <div class="equity-empty">Keine Trades in diesem Monat.</div>
    `;
    document.getElementById('statsMonthPrev').addEventListener('click', () => shiftStatsMonth(-1));
    document.getElementById('statsMonthNext').addEventListener('click', () => shiftStatsMonth(1));
    return;
  }

  const longs = monthTrades.filter(t => t.direction === 'long');
  const shorts = monthTrades.filter(t => t.direction === 'short');
  const wins = monthTrades.filter(t => t.pnl > 0);
  const losses = monthTrades.filter(t => t.pnl < 0);
  const sumPnl = arr => arr.reduce((s,t) => s+t.pnl, 0);
  const winRateOf = arr => arr.length ? (arr.filter(t=>t.pnl>0).length/arr.length*100) : 0;
  const best = monthTrades.reduce((mm,t) => t.pnl > (mm ? mm.pnl : -Infinity) ? t : mm, null);
  const worst = monthTrades.reduce((mm,t) => t.pnl < (mm ? mm.pnl : Infinity) ? t : mm, null);
  const totalPnl = sumPnl(monthTrades);
  const winSum = sumPnl(wins);
  const lossSum = Math.abs(sumPnl(losses));
  const profitFactor = lossSum > 0 ? (winSum/lossSum).toFixed(2) : (winSum > 0 ? '∞' : '–');

  container.innerHTML = `
    <div class="month-nav">
      <button type="button" class="period-arrow" id="statsMonthPrev" aria-label="Vorheriger Monat">‹</button>
      <span class="month-nav-label">${monthLabel}</span>
      <button type="button" class="period-arrow" id="statsMonthNext" aria-label="Nächster Monat">›</button>
    </div>
    <div class="stat-block">
      <p class="kicker">Monatsjournal</p>
      ${fmtRow('Trades gesamt', monthTrades.length)}
      ${fmtRow('Gesamtergebnis', fmt(totalPnl))}
      ${fmtRow('Trefferquote', winRateOf(monthTrades).toFixed(1) + ' %')}
      ${fmtRow('Profitfaktor', profitFactor)}
      ${fmtRow('Bester Trade', best ? `${fmt(best.pnl)} · ${best.asset}` : '–')}
      ${fmtRow('Schlechtester Trade', worst ? `${fmt(worst.pnl)} · ${worst.asset}` : '–')}
    </div>
    <div class="stat-block">
      <p class="kicker">Long</p>
      ${fmtRow('Anzahl', longs.length)}
      ${fmtRow('Ergebnis', longs.length ? fmt(sumPnl(longs)) : '–')}
      ${fmtRow('Trefferquote', longs.length ? winRateOf(longs).toFixed(1) + ' %' : '–')}
    </div>
    <div class="stat-block">
      <p class="kicker">Short</p>
      ${fmtRow('Anzahl', shorts.length)}
      ${fmtRow('Ergebnis', shorts.length ? fmt(sumPnl(shorts)) : '–')}
      ${fmtRow('Trefferquote', shorts.length ? winRateOf(shorts).toFixed(1) + ' %' : '–')}
    </div>
    <div class="stat-block">
      <p class="kicker">Equity Curve</p>
      <div id="statsPageChart">${buildEquityCurveSvg(monthTrades, 130)}</div>
    </div>
  `;
  document.getElementById('statsMonthPrev').addEventListener('click', () => shiftStatsMonth(-1));
  document.getElementById('statsMonthNext').addEventListener('click', () => shiftStatsMonth(1));
}

function renderStats(filtered){
  const total = filtered.length;
  const pnls = filtered.map(t => t.pnl);
  const wins = pnls.filter(p => p > 0);
  const losses = pnls.filter(p => p < 0);
  const totalPnl = pnls.reduce((a,b) => a+b, 0);
  const winRate = total ? (wins.length / total * 100) : 0;
  const avgWin = wins.length ? wins.reduce((a,b)=>a+b,0)/wins.length : 0;
  const avgLoss = losses.length ? Math.abs(losses.reduce((a,b)=>a+b,0)/losses.length) : 0;
  const lossSum = Math.abs(losses.reduce((a,b)=>a+b,0));
  const winSum = wins.reduce((a,b)=>a+b,0);
  let profitFactor = '–';
  if(lossSum > 0) profitFactor = (winSum/lossSum).toFixed(2);
  else if(winSum > 0) profitFactor = '∞';

  const periodLabel = PERIODS.find(([k]) => k === currentPeriod)[1];
  document.getElementById('heroLabel').textContent = 'Ergebnis · ' + periodLabel;

  const hero = document.getElementById('heroPnl');
  hero.textContent = fmt(totalPnl);
  hero.className = 'hero-num ' + (totalPnl > 0 ? 'gain' : totalPnl < 0 ? 'loss' : 'neutral');

  const accountBalance = startBalance + trades.reduce((s,t) => s + t.pnl, 0);

  const heroPct = document.getElementById('heroPct');
  if(accountBalance !== 0){
    const pct = (totalPnl / accountBalance) * 100;
    heroPct.textContent = '(' + (pct > 0 ? '+' : '') + pct.toLocaleString('de-DE',{minimumFractionDigits:1,maximumFractionDigits:1}) + ' %)';
    heroPct.className = 'hero-pct ' + (totalPnl > 0 ? 'gain' : totalPnl < 0 ? 'loss' : 'neutral');
  } else {
    heroPct.textContent = '';
  }

  const balanceEl = document.getElementById('balanceNum');
  if(balanceEl){
    balanceEl.textContent = fmtPlain(accountBalance);
  }

  const stats = [
    ['Trades', total],
    ['Trefferquote', total ? winRate.toFixed(1) + ' %' : '–'],
    ['Profitfaktor', profitFactor],
    ['Ø Gewinn', wins.length ? fmt(avgWin) : '–'],
    ['Ø Verlust', losses.length ? fmt(-avgLoss) : '–']
  ];
  const grid = document.getElementById('statsGrid');
  grid.innerHTML = '';
  stats.forEach(([label,val]) => {
    const d = document.createElement('div');
    d.className = 'stat';
    d.innerHTML = `<p class="kicker">${label}</p><div class="stat-val">${val}</div>`;
    grid.appendChild(d);
  });
}

function buildEquityCurveSvg(filtered, height){
  if(filtered.length === 0){
    return '<div class="equity-empty">Keine Trades in diesem Zeitraum.</div>';
  }
  if(filtered.length < 2){
    return '<div class="equity-empty">Noch nicht genug Einträge für eine Kurve.</div>';
  }
  const sorted = [...filtered].sort((a,b) => a.date.localeCompare(b.date) || a.id.localeCompare(b.id));
  let running = 0;
  const points = sorted.map(t => { running += t.pnl; return running; });
  points.unshift(0);

  const w = 600, h = height || 160, padX = 8, padY = 12;
  const min = Math.min(0, ...points);
  const max = Math.max(0, ...points);
  const range = (max - min) || 1;
  const slots = Math.max(50, points.length - 1);
  const stepX = (w - padX*2) / slots;

  const coords = points.map((v, i) => {
    const x = padX + i * stepX;
    const y = padY + (1 - (v - min) / range) * (h - padY*2);
    return [x, y];
  });
  const zeroY = padY + (1 - (0 - min) / range) * (h - padY*2);

  const linePath = coords.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const areaPath = linePath + ` L${coords[coords.length-1][0].toFixed(1)} ${zeroY.toFixed(1)} L${coords[0][0].toFixed(1)} ${zeroY.toFixed(1)} Z`;

  const final = points[points.length - 1];
  const lineColor = final >= 0 ? '#6FB585' : '#D07A63';

  return `
    <svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none" role="img" aria-label="Equity Curve, Verlauf des kumulierten Ergebnisses">
      <line x1="0" y1="${zeroY.toFixed(1)}" x2="${w}" y2="${zeroY.toFixed(1)}" stroke="#2C3846" stroke-width="1"/>
      <path d="${areaPath}" fill="${lineColor}" opacity="0.12" stroke="none"/>
      <path d="${linePath}" fill="none" stroke="${lineColor}" stroke-width="2"/>
    </svg>`;
}

function renderEquityCurve(filtered){
  document.getElementById('equityChart').innerHTML = buildEquityCurveSvg(filtered, 160);
}

function getDashboardFiltered(base){
  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);
  const monthStr = todayStr.slice(0,7);
  const yearStr = todayStr.slice(0,4);
  return base.filter(t => {
    if(currentPeriod === 'daily') return t.date === todayStr;
    if(currentPeriod === 'annually') return t.date.slice(0,4) === yearStr;
    return t.date.slice(0,7) === monthStr;
  });
}

function render(){
  renderPeriodNav();
  renderPeriodLabel();
  const dashFiltered = getDashboardFiltered(trades);
  renderStats(dashFiltered);
  renderEquityCurve(dashFiltered);
}

(function setupSwipe(){
  const card = document.getElementById('equityCard');
  let startX = 0, startY = 0, dragging = false;

  card.addEventListener('touchstart', (e) => {
    startX = e.changedTouches[0].clientX;
    startY = e.changedTouches[0].clientY;
    dragging = true;
    const chart = document.getElementById('equityChart');
    chart.style.transition = 'none';
  }, {passive:true});

  card.addEventListener('touchmove', (e) => {
    if(!dragging) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if(Math.abs(dx) > Math.abs(dy)){
      const chart = document.getElementById('equityChart');
      chart.style.transform = `translateX(${dx}px)`;
      chart.style.opacity = String(Math.max(0.35, 1 - Math.abs(dx)/260));
    }
  }, {passive:true});

  card.addEventListener('touchend', (e) => {
    dragging = false;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    const chart = document.getElementById('equityChart');
    chart.style.transition = 'transform 0.22s ease, opacity 0.22s ease';
    if(Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)){
      slideToPeriod(dx < 0 ? 1 : -1);
    } else {
      chart.style.transform = 'translateX(0)';
      chart.style.opacity = '1';
    }
  }, {passive:true});

  document.getElementById('periodPrev').addEventListener('click', () => slideToPeriod(-1));
  document.getElementById('periodNext').addEventListener('click', () => slideToPeriod(1));
})();
