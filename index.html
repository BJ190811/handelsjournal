<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handelsjournal</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#10151C">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-950:#10151C;
    --ink-900:#171E27;
    --ink-850:#1C2430;
    --ink-800:#212B37;
    --ink-700:#2C3846;
    --parchment:#EDE7D9;
    --parchment-dim:#A9A290;
    --muted:#7D8894;
    --gold:#C9A227;
    --gold-soft:#4A3F1E;
    --gain:#6FB585;
    --loss:#D07A63;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--ink-950) url('bg-texture.jpg') center top / cover no-repeat;
    background-attachment:local;
    color:var(--parchment);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .wrap{max-width:760px;margin:0 auto;padding:2.5rem 1.5rem 5rem;}

  .ledger-head{
    display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:1px solid var(--gold-soft);
    padding-bottom:1.1rem;margin-bottom:0.4rem;
  }
  .ledger-head .under{
    border-bottom:1px solid var(--ink-700);
    margin-bottom:2rem;
  }
  h1{
    font-family:'Inter',sans-serif;
    font-weight:800;
    font-size:1.3rem;
    margin:0;
    letter-spacing:-0.01em;
  }
  .kicker{
    font-size:0.72rem;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--muted);
    margin:0 0 0.35rem;
  }
  .date-badge{
    font-family:'Inter',sans-serif;
    font-variant-numeric:tabular-nums;
    font-size:0.78rem;
    color:var(--parchment-dim);
  }

  .hero{margin:1.2rem 0 1.6rem;}
  .hero .kicker{margin-bottom:0.25rem;}
  .hero-num{
    font-family:'Inter',sans-serif;
    font-variant-numeric:tabular-nums;
    font-size:1.9rem;
    font-weight:700;
    line-height:1;
  }
  .gain{color:var(--gain);}
  .loss{color:var(--loss);}
  .neutral{color:var(--parchment-dim);}

  .balance-edit-input{
    background:var(--ink-850);
    border:1px solid var(--gold);
    color:var(--parchment);
    font-family:'Inter',sans-serif;
    font-variant-numeric:tabular-nums;
    font-size:0.98rem;
    font-weight:500;
    width:100%;
    padding:0.05rem 0.2rem;
    border-radius:2px;
  }

  .balance-row{
    margin-bottom:1.6rem;
    padding-bottom:1.4rem;
    border-bottom:1px solid var(--ink-700);
  }
  .balance-row .kicker{margin-bottom:0.25rem;}
  .balance-num{
    font-family:'Inter',sans-serif;
    font-variant-numeric:tabular-nums;
    font-size:1.3rem;
    font-weight:500;
    color:var(--parchment);
    cursor:pointer;
    border-bottom:1px dashed var(--muted);
    display:inline-block;
  }

  .stats{
    display:flex;
    flex-wrap:wrap;
    gap:1px;
    background:var(--ink-700);
    border:1px solid var(--ink-700);
    margin-bottom:1.6rem;
  }
  .stat{
    background:var(--ink-900);
    padding:0.55rem 0.7rem;
    flex:1 1 105px;
  }
  .stat .kicker{margin-bottom:0.2rem;font-size:0.62rem;}
  .stat-val{
    font-family:'Inter',sans-serif;
    font-variant-numeric:tabular-nums;
    font-size:0.98rem;
    font-weight:600;
  }

  .equity-card{
    background:var(--ink-900);
    border:1px solid var(--ink-700);
    padding:1.1rem 1.2rem 0.6rem;
    margin-bottom:2.4rem;
  }
  .equity-head{
    display:flex;justify-content:space-between;align-items:center;
    flex-wrap:wrap;gap:0.5rem;
    margin-bottom:0.6rem;
  }
  .equity-head .kicker{margin-bottom:0;}
  .period-nav{
    display:flex;align-items:center;gap:0.5rem;
  }
  .period-arrow{
    background:none;
    border:1px solid var(--ink-700);
    color:var(--parchment-dim);
    width:24px;height:24px;
    border-radius:2px;
    cursor:pointer;
    font-size:0.85rem;
    line-height:1;
    display:flex;align-items:center;justify-content:center;
    padding:0;
  }
  .period-arrow:hover{border-color:var(--gold);color:var(--gold);}
  .period-arrow:active{background:var(--gold-soft);}
  .period-active{
    font-family:'Inter',sans-serif;
    font-size:0.78rem;
    font-weight:500;
    color:var(--gold);
    min-width:64px;
    text-align:center;
  }
  .equity-viewport{overflow:hidden;}
  #equityChart{
    transition:transform 0.22s ease, opacity 0.22s ease;
  }
  .period-label{
    font-family:'Inter',sans-serif;
    font-variant-numeric:tabular-nums;
    font-weight:500;
    font-size:0.78rem;
    color:var(--gold);
    margin:0 0 0.6rem;
  }
  .equity-card{touch-action:pan-y;}
  .equity-empty{
    color:var(--parchment-dim);
    font-size:0.82rem;
    padding:1.5rem 0;
    text-align:center;
  }

  .toolbar{
    display:flex;flex-wrap:wrap;gap:0.6rem;
    align-items:center;justify-content:space-between;
    margin-bottom:1.4rem;
  }
  .filters{display:flex;flex-wrap:wrap;gap:0.4rem;}
  .chip{
    font-family:'Inter',sans-serif;
    font-size:0.78rem;
    padding:0.35rem 0.75rem;
    border:1px solid var(--ink-700);
    background:transparent;
    color:var(--parchment-dim);
    cursor:pointer;
    border-radius:2px;
  }
  .chip.active{
    border-color:var(--gold);
    color:var(--gold);
  }
  .btn{
    font-family:'Inter',sans-serif;
    font-size:0.82rem;
    font-weight:500;
    padding:0.55rem 1rem;
    border:1px solid var(--gold);
    background:transparent;
    color:var(--gold);
    cursor:pointer;
    border-radius:2px;
    white-space:nowrap;
  }
  .btn:hover{background:var(--gold-soft);}

  .modal-overlay{
    display:none;
    position:fixed;inset:0;
    background:rgba(8,11,15,0.72);
    align-items:center;justify-content:center;
    padding:1.2rem;
    z-index:100;
  }
  .modal-overlay.open{display:flex;}
  .panel{
    background:var(--ink-900);
    border:1px solid var(--ink-700);
    padding:1.4rem;
    width:100%;
    max-width:460px;
    max-height:90vh;
    overflow-y:auto;
  }
  .panel-head{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:1.1rem;
  }
  .panel-head h2{
    font-family:'Inter',sans-serif;
    font-weight:700;
    font-size:1.1rem;
    margin:0;
  }
  .modal-close{
    background:none;border:none;color:var(--muted);
    font-size:1.1rem;cursor:pointer;padding:0.2rem 0.4rem;
  }
  .modal-close:hover{color:var(--parchment);}
  .grid-form{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:0.9rem;
  }
  .field label{
    display:block;
    font-size:0.72rem;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:0.35rem;
  }
  .field input{
    width:100%;
    background:var(--ink-850);
    border:1px solid var(--ink-700);
    color:var(--parchment);
    padding:0.5rem 0.6rem;
    font-family:'Inter',sans-serif;
    font-size:0.86rem;
    border-radius:2px;
  }
  .dir-toggle{display:flex;gap:0.4rem;}
  .dir-toggle button{
    flex:1;
    padding:0.5rem;
    background:var(--ink-850);
    border:1px solid var(--ink-700);
    color:var(--parchment-dim);
    cursor:pointer;
    font-size:0.82rem;
    border-radius:2px;
  }
  .dir-toggle button.sel-long{border-color:var(--gain);color:var(--gain);}
  .dir-toggle button.sel-short{border-color:var(--loss);color:var(--loss);}
  .panel-actions{
    margin-top:1.2rem;display:flex;gap:0.6rem;justify-content:flex-end;
  }
  .btn-ghost{
    border-color:var(--ink-700);color:var(--parchment-dim);
  }
  .btn-ghost:hover{background:var(--ink-800);}

  .ledger{
    border:1px solid var(--ink-700);
    background:var(--ink-900);
  }
  .row{
    display:grid;
    grid-template-columns:100px 90px 1fr 1fr 32px;
    gap:0.6rem;
    align-items:center;
    padding:0.75rem 1rem;
    border-bottom:1px solid var(--ink-800);
    font-size:0.85rem;
  }
  .row:last-child{border-bottom:none;}
  .row.head{
    font-size:0.68rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--muted);
    background:var(--ink-850);
  }
  .row.entry:nth-child(even){background:var(--ink-850);}
  .mono{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;}
  .sym{font-weight:500;}
  .dir-tag{
    font-size:0.72rem;
    padding:0.15rem 0.4rem;
    border-radius:2px;
    display:inline-block;
    width:fit-content;
  }
  .dir-tag.long{color:var(--gain);border:1px solid var(--gain);}
  .dir-tag.short{color:var(--loss);border:1px solid var(--loss);}
  .del-btn{
    background:none;border:none;color:var(--muted);
    cursor:pointer;font-size:0.95rem;
  }
  .del-btn:hover{color:var(--loss);}

  .empty{
    text-align:center;
    padding:3rem 1rem;
    color:var(--parchment-dim);
  }
  .empty h3{
    font-family:'Inter',sans-serif;font-weight:700;
    color:var(--parchment);margin:0 0 0.4rem;
  }

  @media(max-width:600px){
    .row{
      grid-template-columns:1fr 1fr;
      row-gap:0.3rem;
      position:relative;
      padding-right:2.5rem;
    }
    .row.head{display:none;}
    .col-del{position:absolute;right:1rem;top:0.75rem;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="ledger-head">
    <div>
      <p class="kicker">Handelsjournal</p>
      <h1>Alle Trades im Überblick</h1>
    </div>
    <div class="date-badge" id="today"></div>
  </div>
  <div class="under"></div>

  <div class="hero">
    <p class="kicker" id="heroLabel">Gesamtergebnis</p>
    <div class="hero-num neutral" id="heroPnl">0,00</div>
  </div>

  <div class="balance-row">
    <p class="kicker">Kontostand</p>
    <div class="balance-num" id="balanceNum" onclick="startEditBalance()">0,00</div>
  </div>

  <div class="stats" id="statsGrid"></div>

  <div class="equity-card" id="equityCard">
    <div class="equity-head">
      <p class="kicker">Equity Curve</p>
      <div class="period-nav">
        <button type="button" class="period-arrow" id="periodPrev" aria-label="Vorheriger Zeitraum">‹</button>
        <span class="period-active" id="periodActive"></span>
        <button type="button" class="period-arrow" id="periodNext" aria-label="Nächster Zeitraum">›</button>
      </div>
    </div>
    <p class="period-label" id="periodLabel"></p>
    <div class="equity-viewport">
      <div id="equityChart"></div>
    </div>
  </div>

  <div class="toolbar">
    <div class="filters" id="filterChips"></div>
    <button class="btn" id="toggleFormBtn">+ Neuer Trade</button>
  </div>

  <div class="modal-overlay" id="tradeModal">
    <div class="panel" id="tradePanel">
      <div class="panel-head">
        <h2>Neuer Eintrag</h2>
        <button type="button" class="modal-close" onclick="closePanel()" aria-label="Schließen">✕</button>
      </div>
      <div class="grid-form">
        <div class="field">
          <label>Datum</label>
          <input type="date" id="f-date">
        </div>
        <div class="field">
          <label>Richtung</label>
          <div class="dir-toggle">
            <button type="button" id="f-long" onclick="setDirection('long')">Long</button>
            <button type="button" id="f-short" onclick="setDirection('short')">Short</button>
          </div>
        </div>
        <div class="field">
          <label>Asset</label>
          <input type="text" id="f-asset" placeholder="z. B. AAPL, BTC, EUR/USD">
        </div>
        <div class="field">
          <label>P&L</label>
          <input type="number" step="any" id="f-pnl" placeholder="z. B. 150 oder -80">
        </div>
      </div>
      <div class="panel-actions">
        <button class="btn btn-ghost" onclick="closePanel()">Abbrechen</button>
        <button class="btn" onclick="saveTrade()">Trade speichern</button>
      </div>
    </div>
  </div>

  <div id="ledgerContainer"></div>

</div>

<script>
let trades = [];
let startBalance = 0;
let currentFilter = 'Alle';
let currentPeriod = 'monthly';
let currentDirection = 'long';
const FILTERS = ['Alle','Long','Short'];
const PERIODS = [['daily','Täglich'],['monthly','Monatlich'],['annually','Jährlich']];

function loadStartBalance(){
  try{
    const raw = localStorage.getItem('startBalance');
    startBalance = raw ? parseFloat(raw) : 0;
  }catch(e){
    startBalance = 0;
  }
}

document.getElementById('today').textContent = new Date().toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
document.getElementById('f-date').valueAsDate = new Date();

function fmt(n){
  const sign = n > 0 ? '+' : '';
  return sign + n.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2});
}

async function loadTrades(){
  try{
    const raw = localStorage.getItem('trades');
    trades = raw ? JSON.parse(raw) : [];
  }catch(e){
    trades = [];
  }
  render();
}

async function persist(){
  try{
    localStorage.setItem('trades', JSON.stringify(trades));
  }catch(e){
    console.error('Speichern fehlgeschlagen', e);
  }
}

function setDirection(d){
  currentDirection = d;
  document.getElementById('f-long').className = d === 'long' ? 'sel-long' : '';
  document.getElementById('f-short').className = d === 'short' ? 'sel-short' : '';
}
setDirection('long');

function togglePanel(){
  document.getElementById('tradeModal').classList.add('open');
}
function closePanel(){
  document.getElementById('tradeModal').classList.remove('open');
  clearForm();
}
document.getElementById('tradeModal').addEventListener('click', (e) => {
  if(e.target.id === 'tradeModal') closePanel();
});
function clearForm(){
  document.getElementById('f-pnl').value = '';
  document.getElementById('f-asset').value = '';
  document.getElementById('f-date').valueAsDate = new Date();
  setDirection('long');
}

async function saveTrade(){
  const pnl = parseFloat(document.getElementById('f-pnl').value);
  const date = document.getElementById('f-date').value;
  const asset = document.getElementById('f-asset').value.trim();
  if(!date || isNaN(pnl) || !asset){
    alert('Bitte Datum, Asset und P&L ausfüllen.');
    return;
  }
  const trade = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,7),
    date,
    direction: currentDirection,
    asset,
    pnl
  };
  trades.push(trade);
  await persist();
  closePanel();
  render();
}

async function deleteTrade(id){
  trades = trades.filter(t => t.id !== id);
  await persist();
  render();
}

function renderFilters(){
  const el = document.getElementById('filterChips');
  el.innerHTML = '';
  FILTERS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'chip' + (currentFilter === c ? ' active' : '');
    b.textContent = c;
    b.onclick = () => { currentFilter = c; render(); };
    el.appendChild(b);
  });
}

function renderPeriodLabel(){
  const today = new Date();
  let text = '';
  if(currentPeriod === 'daily'){
    text = today.toLocaleDateString('de-DE', {day:'numeric', month:'long', year:'numeric'});
  } else if(currentPeriod === 'annually'){
    text = today.toLocaleDateString('de-DE', {year:'numeric'});
  } else {
    text = today.toLocaleDateString('de-DE', {month:'long', year:'numeric'});
  }
  document.getElementById('periodLabel').textContent = text;
}

function renderPeriodNav(){
  document.getElementById('periodActive').textContent = PERIODS.find(([k]) => k === currentPeriod)[1];
}

function cyclePeriod(dir){
  const idx = PERIODS.findIndex(([k]) => k === currentPeriod);
  const nextIdx = (idx + dir + PERIODS.length) % PERIODS.length;
  currentPeriod = PERIODS[nextIdx][0];
  render();
}

function slideToPeriod(dir){
  const chart = document.getElementById('equityChart');
  chart.style.transform = `translateX(${dir * -260}px)`;
  chart.style.opacity = '0';
  setTimeout(() => {
    cyclePeriod(dir);
    const fresh = document.getElementById('equityChart');
    fresh.style.transition = 'none';
    fresh.style.transform = `translateX(${dir * 260}px)`;
    void fresh.offsetWidth;
    fresh.style.transition = 'transform 0.22s ease, opacity 0.22s ease';
    fresh.style.transform = 'translateX(0)';
    fresh.style.opacity = '1';
  }, 220);
}

function renderStats(filtered){
  const total = filtered.length;
  const pnls = filtered.map(t => t.pnl);
  const wins = pnls.filter(p => p > 0);
  const losses = pnls.filter(p => p < 0);
  const totalPnl = pnls.reduce((a,b) => a+b, 0);
  const winRate = total ? (wins.length / total * 100) : 0;
  const avgWin = wins.length ? wins.reduce((a,b)=>a+b,0)/wins.length : 0;
  const avgLoss = losses.length ? Math.abs(losses.reduce((a,b)=>a+b,0)/losses.length) : 0;
  const lossSum = Math.abs(losses.reduce((a,b)=>a+b,0));
  const winSum = wins.reduce((a,b)=>a+b,0);
  let profitFactor = '–';
  if(lossSum > 0) profitFactor = (winSum/lossSum).toFixed(2);
  else if(winSum > 0) profitFactor = '∞';

  const periodLabel = PERIODS.find(([k]) => k === currentPeriod)[1];
  document.getElementById('heroLabel').textContent = 'Ergebnis · ' + periodLabel;

  const hero = document.getElementById('heroPnl');
  hero.textContent = fmt(totalPnl);
  hero.className = 'hero-num ' + (totalPnl > 0 ? 'gain' : totalPnl < 0 ? 'loss' : 'neutral');

  const accountBalance = startBalance + trades.reduce((s,t) => s + t.pnl, 0);
  const balanceEl = document.getElementById('balanceNum');
  if(balanceEl){
    balanceEl.textContent = accountBalance.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2});
  }

  const stats = [
    ['Trades', total],
    ['Trefferquote', total ? winRate.toFixed(1) + ' %' : '–'],
    ['Profitfaktor', profitFactor],
    ['Ø Gewinn', wins.length ? '+' + avgWin.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2}) : '–'],
    ['Ø Verlust', losses.length ? '-' + avgLoss.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2}) : '–']
  ];
  const grid = document.getElementById('statsGrid');
  grid.innerHTML = '';
  stats.forEach(([label,val]) => {
    const d = document.createElement('div');
    d.className = 'stat';
    d.innerHTML = `<p class="kicker">${label}</p><div class="stat-val">${val}</div>`;
    grid.appendChild(d);
  });
}

function startEditBalance(){
  const el = document.getElementById('balanceNum');
  el.outerHTML = `<input type="number" step="any" id="balanceInput" class="balance-edit-input" value="${startBalance.toFixed(2)}">`;
  const input = document.getElementById('balanceInput');
  input.focus();
  input.select();
  input.addEventListener('blur', commitBalanceEdit);
  input.addEventListener('keydown', (e) => { if(e.key === 'Enter') input.blur(); });
}

function commitBalanceEdit(){
  const input = document.getElementById('balanceInput');
  const val = parseFloat(input.value);
  startBalance = isNaN(val) ? 0 : val;
  try{ localStorage.setItem('startBalance', startBalance); }catch(e){}
  render();
}

function renderLedger(filtered){
  const container = document.getElementById('ledgerContainer');
  if(filtered.length === 0){
    container.innerHTML = `<div class="empty">
      <h3>Noch keine Einträge</h3>
      <p>Trage deinen ersten Trade ein und beginne dein Journal.</p>
    </div>`;
    return;
  }
  const sorted = [...filtered].sort((a,b) => b.date.localeCompare(a.date));
  let html = `<div class="ledger">
    <div class="row head">
      <div>Datum</div><div>Richtung</div><div>Asset</div><div>P&L</div><div></div>
    </div>`;
  sorted.forEach(t => {
    const win = t.pnl > 0;
    html += `<div class="row entry">
      <div class="mono">${t.date ? t.date.split('-').reverse().join('.') : '–'}</div>
      <div><span class="dir-tag ${t.direction}">${t.direction === 'long' ? 'Long' : 'Short'}</span></div>
      <div class="sym">${t.asset || '–'}</div>
      <div class="mono ${win ? 'gain' : t.pnl < 0 ? 'loss' : 'neutral'}">${fmt(t.pnl)}</div>
      <div class="col-del"><button class="del-btn" onclick="deleteTrade('${t.id}')" aria-label="Trade löschen" title="Löschen">✕</button></div>
    </div>`;
  });
  html += `</div>`;
  container.innerHTML = html;
}

function renderEquityCurve(filtered){
  const container = document.getElementById('equityChart');
  if(filtered.length === 0){
    container.innerHTML = '<div class="equity-empty">Keine Trades in diesem Zeitraum.</div>';
    return;
  }
  if(filtered.length < 2){
    container.innerHTML = '<div class="equity-empty">Noch nicht genug Einträge für eine Kurve.</div>';
    return;
  }
  const sorted = [...filtered].sort((a,b) => a.date.localeCompare(b.date) || a.id.localeCompare(b.id));
  let running = 0;
  const points = sorted.map(t => { running += t.pnl; return running; });
  points.unshift(0);

  const w = 600, h = 160, padX = 8, padY = 12;
  const min = Math.min(0, ...points);
  const max = Math.max(0, ...points);
  const range = (max - min) || 1;
  const slots = Math.max(50, points.length - 1);
  const stepX = (w - padX*2) / slots;

  const coords = points.map((v, i) => {
    const x = padX + i * stepX;
    const y = padY + (1 - (v - min) / range) * (h - padY*2);
    return [x, y];
  });
  const zeroY = padY + (1 - (0 - min) / range) * (h - padY*2);

  const linePath = coords.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const areaPath = linePath + ` L${coords[coords.length-1][0].toFixed(1)} ${zeroY.toFixed(1)} L${coords[0][0].toFixed(1)} ${zeroY.toFixed(1)} Z`;

  const final = points[points.length - 1];
  const lineColor = final >= 0 ? '#6FB585' : '#D07A63';

  container.innerHTML = `
    <svg viewBox="0 0 ${w} ${h}" width="100%" height="160" preserveAspectRatio="none" role="img" aria-label="Equity Curve, Verlauf des kumulierten Ergebnisses">
      <line x1="0" y1="${zeroY.toFixed(1)}" x2="${w}" y2="${zeroY.toFixed(1)}" stroke="#2C3846" stroke-width="1"/>
      <path d="${areaPath}" fill="${lineColor}" opacity="0.12" stroke="none"/>
      <path d="${linePath}" fill="none" stroke="${lineColor}" stroke-width="2"/>
    </svg>`;
}

function getFiltered(){
  return trades.filter(t => {
    if(currentFilter === 'Alle') return true;
    if(currentFilter === 'Long') return t.direction === 'long';
    if(currentFilter === 'Short') return t.direction === 'short';
    return true;
  });
}

function getDashboardFiltered(base){
  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);
  const monthStr = todayStr.slice(0,7);
  const yearStr = todayStr.slice(0,4);
  return base.filter(t => {
    if(currentPeriod === 'daily') return t.date === todayStr;
    if(currentPeriod === 'annually') return t.date.slice(0,4) === yearStr;
    return t.date.slice(0,7) === monthStr;
  });
}

function render(){
  renderFilters();
  renderPeriodNav();
  renderPeriodLabel();
  const filtered = getFiltered();
  const dashFiltered = getDashboardFiltered(filtered);
  renderStats(dashFiltered);
  renderEquityCurve(dashFiltered);
  renderLedger(filtered);
}

document.getElementById('toggleFormBtn').addEventListener('click', togglePanel);

(function setupSwipe(){
  const card = document.getElementById('equityCard');
  let startX = 0, startY = 0, dragging = false;

  card.addEventListener('touchstart', (e) => {
    startX = e.changedTouches[0].clientX;
    startY = e.changedTouches[0].clientY;
    dragging = true;
    const chart = document.getElementById('equityChart');
    chart.style.transition = 'none';
  }, {passive:true});

  card.addEventListener('touchmove', (e) => {
    if(!dragging) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if(Math.abs(dx) > Math.abs(dy)){
      const chart = document.getElementById('equityChart');
      chart.style.transform = `translateX(${dx}px)`;
      chart.style.opacity = String(Math.max(0.35, 1 - Math.abs(dx)/260));
    }
  }, {passive:true});

  card.addEventListener('touchend', (e) => {
    dragging = false;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    const chart = document.getElementById('equityChart');
    chart.style.transition = 'transform 0.22s ease, opacity 0.22s ease';
    if(Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)){
      slideToPeriod(dx < 0 ? 1 : -1);
    } else {
      chart.style.transform = 'translateX(0)';
      chart.style.opacity = '1';
    }
  }, {passive:true});

  document.getElementById('periodPrev').addEventListener('click', () => slideToPeriod(-1));
  document.getElementById('periodNext').addEventListener('click', () => slideToPeriod(1));
})();

loadStartBalance();
loadTrades();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

</script>
